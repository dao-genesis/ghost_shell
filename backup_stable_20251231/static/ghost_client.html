<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 强制禁用缓存 -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Ghost Shell - AI 远程控制</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: #16213e;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #0f3460;
        }

        h1 {
            font-size: 1.2rem;
            color: #00d9ff;
        }

        .status {
            font-size: 0.85rem;
            padding: 6px 12px;
            border-radius: 20px;
        }

        .status.connected {
            background: #0f3460;
            color: #00ff88;
        }

        .status.disconnected {
            background: #3d0000;
            color: #ff4444;
        }

        main {
            flex: 1;
            display: flex;
            padding: 15px;
            gap: 15px;
        }

        .screen-container {
            flex: 1;
            background: #0f0f23;
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        #screen {
            max-width: 100%;
            max-height: calc(100vh - 120px);
            cursor: crosshair;
        }

        .controls {
            width: 260px;
            background: #16213e;
            border-radius: 12px;
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            overflow-y: auto;
        }

        .control-group {
            margin-bottom: 4px;
        }

        .control-group label {
            display: block;
            margin-bottom: 4px;
            color: #888;
            font-size: 0.75rem;
        }

        input,
        button,
        select {
            width: 100%;
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            font-size: 0.85rem;
        }

        input,
        select {
            background: #0f0f23;
            color: #fff;
            border: 1px solid #0f3460;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: #00d9ff;
        }

        button {
            background: linear-gradient(135deg, #0f3460, #16213e);
            color: #00d9ff;
            cursor: pointer;
            border: 1px solid #0f3460;
            transition: all 0.2s;
        }

        button:hover {
            background: #0f3460;
        }

        button.primary {
            background: linear-gradient(135deg, #00d9ff, #0066ff);
            color: #fff;
            border: none;
        }

        button.danger {
            background: linear-gradient(135deg, #ff4444, #cc0000);
            color: #fff;
            border: none;
        }

        .log {
            flex: 1;
            background: #0f0f23;
            border-radius: 6px;
            padding: 8px;
            font-family: monospace;
            font-size: 0.7rem;
            overflow-y: auto;
            max-height: 150px;
            color: #00ff88;
        }

        .log-entry {
            margin: 2px 0;
        }

        .log-entry.error {
            color: #ff4444;
        }

        .fps {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(0, 0, 0, 0.7);
            padding: 3px 6px;
            border-radius: 4px;
            font-size: 0.65rem;
        }

        .window-info {
            font-size: 0.7rem;
            color: #888;
            margin-top: 4px;
        }

        .locked {
            color: #00ff88;
        }

        @media (max-width: 800px) {
            main {
                flex-direction: column;
            }

            .controls {
                width: 100%;
                max-height: 300px;
            }
        }

        /* Touch ripple animation */
        @keyframes ripple {
            0% {
                transform: scale(0.5);
                opacity: 1;
            }

            100% {
                transform: scale(2);
                opacity: 0;
            }
        }
    </style>
</head>

<body>
    <header>
        <h1>🔮 Ghost Shell</h1>
        <div id="status" class="status disconnected">未连接</div>
    </header>
    <main>
        <div class="screen-container">
            <canvas id="screen" style="max-width: 100%; max-height: calc(100vh - 120px); cursor: crosshair;"></canvas>
            <div class="fps" id="fps">0 FPS</div>
        </div>
        <div class="controls">
            <!-- Row 1: Voice + Audio + Fullscreen + Adapt -->
            <div style="display: flex; gap: 6px;">
                <button id="voiceBtn" onclick="toggleVoice()" class="primary" style="flex: 1; padding: 10px;">
                    🎤 语音
                </button>
                <button id="audioBtn" onclick="toggleAudio()" class="primary" style="flex: 1; padding: 10px;">
                    🔊 音频
                </button>
                <button id="fullscreenBtn" onclick="toggleFullscreen()" style="flex: 1; padding: 10px;">
                    🔲 全屏
                </button>
                <button id="adaptBtn" onclick="toggleAdapt()" style="flex: 1; padding: 10px;">
                    📐 适配
                </button>
            </div>

            <!-- Row 2: Window Select + Lock + Close -->
            <div style="display: flex; gap: 6px; margin-top: 6px; align-items: center;">
                <!-- Native Select Dropdown -->
                <select id="windowSelect" onchange="handleWindowSelect()"
                    style="flex: 2; padding: 8px; font-size: 0.85rem;">
                    <option value="">🔍 自动检测...</option>
                </select>

                <button id="lockBtn" onclick="toggleLock()" style="flex: 1; padding: 10px;">
                    🔒 锁定
                </button>

                <!-- Close Current Window Button -->
                <button id="closeBtn" onclick="closeCurrentWindow()"
                    style="flex: 1; padding: 10px; background: #661111; border: 1px solid #ff4444; color: #ff6b6b; cursor: pointer; border-radius: 4px; font-size: 0.85rem;"
                    title="关闭当前窗口">
                    ✕ 关闭
                </button>
            </div>

            <!-- Pie Control UI -->
            <div id="pieMenu" style="display: none; position: fixed; z-index: 2100; pointer-events: none;">
                <!-- Center Info -->
                <div id="pieCenter" style="
                    position: absolute; left: -30px; top: -30px; width: 60px; height: 60px;
                    background: rgba(16, 33, 60, 0.9); border: 2px solid #00d9ff;
                    border-radius: 50%; color: #fff; display: flex; align-items: center; 
                    justify-content: center; font-size: 0.8rem; font-weight: bold;
                    box-shadow: 0 0 15px rgba(0, 217, 255, 0.5);
                "></div>
                <!-- Sectors Container -->
                <div id="pieSectors" style="position: absolute; left: 0; top: 0;"></div>
            </div>

            <!-- Floating Trigger Ball -->
            <div id="floatTrigger" style="
                position: fixed; right: 0; top: 60%; width: 44px; height: 44px;
                margin-top: -22px;
                background: rgba(255, 255, 255, 0.2); 
                border: 1px solid rgba(255, 255, 255, 0.3);
                border-radius: 50%;
                z-index: 2200; 
                touch-action: none;
                transition: opacity 0.3s;
                box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            ">
                <!-- Inner dot -->
                <div style="
                    position: absolute; left: 50%; top: 50%; width: 8px; height: 8px;
                    margin: -4px; background: rgba(255,255,255,0.8); border-radius: 50%;
                "></div>
            </div>

            <!-- Hidden input for keyboard capture -->
            <input type="text" id="mobileKeyboardInput" autocomplete="off" autocorrect="off" autocapitalize="off"
                spellcheck="false"
                style="position: fixed; left: -9999px; top: 50%; width: 1px; height: 1px; opacity: 0.01; z-index: 9999; pointer-events: none;"
                placeholder="在此输入..." inputmode="text">

            <!-- Collapsible advanced section -->
            <details style="margin-top: 8px;">
                <summary style="cursor: pointer; color: #00d9ff; font-size: 0.85rem;">▶ ⚙️ 更多选项</summary>

                <div style="margin-top: 10px;">
                    <!-- Touch hints -->
                    <div style="font-size: 0.65rem; color: #888; margin-bottom: 10px; line-height: 1.5;">
                        📱 悬浮球：长按拖动吸附 | 向内拉动唤出菜单<br>
                        📱 点击=左键 | 双击=右键 | 快滑=滚动 | 按住拖=连续滚 | 双指=缩放
                    </div>

                    <!-- App Launcher -->
                    <div class="control-group" style="margin-top: 12px;">
                        <label>🚀 快速启动</label>
                        <input type="text" id="appInput" placeholder="输入软件名 (如: chrome)"
                            onkeydown="if(event.key==='Enter')openApp()">
                    </div>
                    <button onclick="openApp()">打开软件</button>

                    <!-- Log (moved here) -->
                    <div class="control-group" style="margin-top: 12px;">
                        <label>📋 操作日志</label>
                        <div class="log" id="log" style="max-height: 80px; font-size: 0.65rem;"></div>
                    </div>

                    <!-- Current window indicator (moved here) -->
                    <div class="window-info" style="font-size: 0.7rem; text-align: center; margin-top: 8px;">
                        当前: <span id="currentWindow">-</span>
                    </div>
                </div>
            </details>
        </div>
    </main>
    <script>
        // API Base URL (handle file:// protocol)
        const API = (window.location.protocol === 'file:') ? 'http://127.0.0.1:8000' : '';

        let ws = null;
        let frameCount = 0;
        let lastFpsTime = Date.now();
        let windowRefreshTimer = null;  // 窗口列表自动刷新定时器
        let serverWindowWidth = 0;      // 服务端发送的窗口宽度
        let serverWindowHeight = 0;     // 服务端发送的窗口高度
        const screen = document.getElementById('screen');
        const status = document.getElementById('status');
        const log = document.getElementById('log');
        const fpsDisplay = document.getElementById('fps');
        const serverInput = null; // Removed server input

        // ==================== Audio Player with Jitter Buffer ====================
        let audioWs = null;
        let audioContext = null;
        let audioEnabled = false;
        let audioNextTime = 0;
        // WAN Optimized: 16kHz Mono = ~32 KB/s (phone call quality)
        const AUDIO_SAMPLE_RATE = 16000;
        const AUDIO_CHANNELS = 1;

        // Jitter buffer settings
        // Server sends ~10ms chunks at 16kHz. 
        // Buffer = 3 * 10ms = 30ms Latency (Low Latency Mode)
        const AUDIO_JITTER_BUFFER_SIZE = 3;
        const AUDIO_MAX_BUFFER_SIZE = 6;       // Drop if > 60ms latency
        let audioBuffer = [];                  // Queue of audio chunks
        let audioBuffering = true;            // Start in buffering mode

        function toggleAudio() {
            const btn = document.getElementById('audioBtn');
            if (audioEnabled) {
                stopAudio();
                btn.classList.remove('primary');
                btn.innerHTML = '🔇 音频';
                addLog('音频已关闭');
            } else {
                startAudio();
                btn.classList.add('primary');
                btn.innerHTML = '🔊 音频';
                addLog('音频已开启');
            }
        }

        function startAudio() {
            if (audioEnabled) return;

            // Build audio WebSocket URL
            let host = window.location.hostname || '127.0.0.1';
            if (host === 'localhost') host = '127.0.0.1';
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsPort = window.location.port || (window.location.protocol === 'https:' ? '8444' : '8000');
            const audioUrl = `${protocol}//${host}:${wsPort}/stream/audio`;

            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: AUDIO_SAMPLE_RATE });
                audioNextTime = 0;
                audioBuffer = [];
                audioBuffering = true;  // Start in buffering mode
                audioWs = new WebSocket(audioUrl);
                audioWs.binaryType = 'arraybuffer';

                audioWs.onopen = () => {
                    audioEnabled = true;
                    // Resume AudioContext (Browser Autoplay Policy)
                    if (audioContext.state === 'suspended') {
                        audioContext.resume();
                    }
                    addLog('音频连接成功 (Jitter Buffer 模式)');
                    const btn = document.getElementById('audioBtn');
                    if (btn) {
                        btn.classList.add('primary');
                        btn.innerHTML = '🔊 音频';
                    }
                };

                audioWs.onmessage = (event) => {
                    if (!audioContext || audioContext.state === 'closed') return;
                    if (audioContext.state === 'suspended') audioContext.resume();

                    const data = event.data;
                    const pcmData = new Int16Array(data);
                    const samples = pcmData.length; // Mono: samples = length
                    if (samples <= 0) return;

                    // Convert Mono Int16 to Float32
                    const buffer = audioContext.createBuffer(1, samples, AUDIO_SAMPLE_RATE);
                    const mono = buffer.getChannelData(0);
                    for (let i = 0; i < samples; i++) {
                        mono[i] = pcmData[i] / 32768;
                    }

                    const source = audioContext.createBufferSource();
                    source.buffer = buffer;
                    source.connect(audioContext.destination);

                    const now = audioContext.currentTime;

                    // Smart Scheduling & Latency Control
                    if (audioNextTime < now) {
                        // Stable Performance Target: 0.12s (120ms)
                        // Balance between responsiveness and stability
                        audioNextTime = now + 0.12;
                    }

                    // Check Latency
                    const latency = audioNextTime - now;

                    // 1. Too much Delay? (>0.2s) -> Speed up slightly to catch up
                    if (latency > 0.2) {
                        // Play 5% faster to drain buffer
                        source.playbackRate.value = 1.05;
                    }
                    // 2. Huge Delay? (>0.8s) -> Jump (Seek)
                    else if (latency > 0.8) {
                        audioNextTime = now + 0.12; // Reset to head
                        console.log("Audio skipped forward to sync.");
                    }
                    // 3. Normal
                    else {
                        source.playbackRate.value = 1.0;
                    }

                    source.start(audioNextTime);
                    // Calculate duration based on playback rate
                    audioNextTime += (buffer.duration / source.playbackRate.value);

                    // Add to queue for reference (optional)
                    audioBuffer.push(source);
                    if (audioBuffer.length > 50) audioBuffer.shift(); // Keep memory clean
                };

                audioWs.onerror = (e) => {
                    addLog('音频连接错误', true);
                };

                audioWs.onclose = () => {
                    if (audioEnabled) {
                        stopAudio();
                    }
                };
            } catch (e) {
                addLog('音频初始化失败: ' + e, true);
            }
        }

        // Removed playNextChunk and setTimeout loop - Pure WebAudio Scheduling
        function stopAudio() {
            audioEnabled = false;
            // audioBuffer = []; // No longer needed
            if (audioWs) {
                audioWs.close();
                audioWs = null;
            }
            if (audioContext) {
                if (audioContext.state !== 'closed') {
                    audioContext.close();
                }
                audioContext = null;
            }
            const btn = document.getElementById('audioBtn');
            if (btn) {
                btn.classList.remove('primary');
                btn.innerHTML = '🔇 音频';
            }
        }



        function addLog(msg, isError = false) {
            const entry = document.createElement('div');
            entry.className = 'log-entry' + (isError ? ' error' : '');
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            log.appendChild(entry);
            log.scrollTop = log.scrollHeight;
            if (log.children.length > 50) log.removeChild(log.firstChild);
        }

        // Throttle function - limits how often a function can be called
        // Essential for touchmove events which fire at 60+ Hz
        function throttle(func, limit) {
            let lastCall = 0;
            let lastArgs = null;
            let timeoutId = null;

            return function (...args) {
                const now = Date.now();
                lastArgs = args;

                if (now - lastCall >= limit) {
                    lastCall = now;
                    func.apply(this, args);
                } else if (!timeoutId) {
                    // Schedule trailing call
                    timeoutId = setTimeout(() => {
                        lastCall = Date.now();
                        timeoutId = null;
                        func.apply(this, lastArgs);
                    }, limit - (now - lastCall));
                }
            };
        }

        // Throttled sendInteraction for high-frequency events (50ms = 20 calls/sec max)
        let throttledSendInteraction = null;  // Will be initialized after sendInteraction is defined

        // Quick Launch App
        function openApp() {
            const input = document.getElementById('appInput');
            const appName = input.value.trim();
            if (!appName) return;

            fetch(API + '/launch', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ app: appName })
            })
                .then(res => res.json())
                .then(data => {
                    addLog(data.message || '启动指令已发送');
                    input.value = ''; // Clear input
                })
                .catch(err => {
                    addLog('启动失败: ' + err, true);
                });
        }

        function toggleConnection() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.close();
            } else {
                connect();
            }
        }

        function connect() {
            // Auto-detect server URL
            let host = window.location.hostname;

            // Fallback for file:// or empty -> use IPv4 loopback
            if (!host || host === 'localhost') {
                host = '127.0.0.1';
                if (window.location.protocol === 'file:') {
                    addLog('检测到本地文件运行，直连 127.0.0.1');
                }
            }

            // If we are on network IP, use it. If hostname is blank (file://), use 127.0.0.1
            // Use same port as page load
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            // Ensure we use the detected port for WebSocket too
            const wsPort = window.location.port || (window.location.protocol === 'https:' ? '8444' : '8000');
            const url = `${protocol}//${host}:${wsPort}/stream`;

            addLog('正在连接 ' + url);

            try {
                ws = new WebSocket(url);

                ws.binaryType = 'arraybuffer'; // 接收二进制帧

                // Traffic Monitor
                let trafficBytes = 0;
                let lastTrafficTime = Date.now();
                if (window.trafficTimer) clearInterval(window.trafficTimer);
                window.trafficTimer = setInterval(() => {
                    const now = Date.now();
                    const elapsed = (now - lastTrafficTime) / 1000;
                    if (elapsed >= 1.0) {
                        try {
                            // Traffic Calculation
                            const speed = trafficBytes / elapsed;
                            const speedKB = (speed / 1024).toFixed(1);
                            const speedMB = (speed / 1024 / 1024).toFixed(2);
                            let trafficStr = `${speedKB} KB/s`;
                            if (speed > 1024 * 1024) trafficStr = `${speedMB} MB/s`;

                            // FPS Logic
                            let fpsStr = `${frameCount} FPS`;
                            // Show Standby if 0 frames and connected
                            if (frameCount === 0 && ws && ws.readyState === WebSocket.OPEN) {
                                fpsStr = "Standby (省流)";
                            }
                            frameCount = 0; // Reset for next cycle

                            const fpsEl = document.getElementById('fps');
                            if (fpsEl) {
                                fpsEl.innerText = `${fpsStr} | ${trafficStr}`;
                            }
                        } catch (e) {
                            console.error("Traffic timer error:", e);
                        }
                        trafficBytes = 0;
                        lastTrafficTime = now;
                    }
                }, 1000);

                ws.onopen = () => {
                    status.textContent = '已连接';
                    status.className = 'status connected';
                    status.onclick = toggleConnection;
                    addLog('连接成功!');
                    refreshWindows();

                    if (windowRefreshTimer) clearInterval(windowRefreshTimer);
                    windowRefreshTimer = setInterval(() => {
                        refreshWindowsQuiet();
                    }, 5000);

                    // 默认开启音频
                    if (!audioEnabled) {
                        startAudio();
                    }
                };

                ws.onmessage = async (event) => {
                    if (event.data) {
                        trafficBytes += (event.data.byteLength || event.data.length || 0);
                    }
                    // 处理二进制图片数据
                    if (event.data instanceof ArrayBuffer) {
                        // Single-frame-at-a-time rendering: Skip if busy, keep only latest
                        if (!window.frameRendering) window.frameRendering = false;
                        if (!window.pendingFrame) window.pendingFrame = null;

                        // If currently rendering, store this as pending (overwrite any older pending)
                        if (window.frameRendering) {
                            window.pendingFrame = event.data;
                            return;
                        }

                        window.frameRendering = true;
                        let dataToRender = event.data;

                        const renderFrame = async (data) => {
                            try {
                                const blob = new Blob([data], { type: 'image/jpeg' });
                                const bitmap = await createImageBitmap(blob);

                                // 调整 Canvas 尺寸以匹配服务端源分辨率
                                if (screen.width !== bitmap.width || screen.height !== bitmap.height) {
                                    screen.width = bitmap.width;
                                    screen.height = bitmap.height;
                                }

                                const ctx = screen.getContext('2d');
                                if (ctx) {
                                    ctx.drawImage(bitmap, 0, 0);
                                }

                                serverWindowWidth = bitmap.width;
                                serverWindowHeight = bitmap.height;
                                frameCount++;
                                bitmap.close();
                            } catch (err) {
                                console.error("Render error:", err);
                            }

                            // Check for pending frame
                            if (window.pendingFrame) {
                                const nextFrame = window.pendingFrame;
                                window.pendingFrame = null;
                                await renderFrame(nextFrame);
                            } else {
                                window.frameRendering = false;
                            }
                        };

                        await renderFrame(dataToRender);
                    }
                    // 处理 JSON 元数据/控制信息
                    else {
                        try {
                            const data = JSON.parse(event.data);
                            if (data.type === 'meta') {
                                // 元数据更新（通常在每一帧之前发送，或者变化时发送）
                                serverWindowWidth = data.width;
                                serverWindowHeight = data.height;
                                // 可以在这里更新 UI 显示的窗口标题等
                                if (data.window) {
                                    // 可以在 UI 上显示当前窗口名 (可选)
                                }
                            } else if (data.type === 'result') {
                                // Command execution result
                                // addLog(`✓ ${data.status}`);  // Uncomment for verbose logging
                            } else if (data.type === 'lock_result') {
                                if (data.status === 'locked') {
                                    addLog(`✅ 已锁定: ${data.title?.substring(0, 30)}`);
                                    document.getElementById('lockBtn').textContent = '🔓 解锁';
                                    document.getElementById('lockBtn').className = 'danger';
                                    document.getElementById('currentWindow').innerHTML = `<span class="locked">🔒 ${data.title}</span>`;
                                } else {
                                    addLog(`锁定失败: ${data.message}`, true);
                                }
                            } else if (data.type === 'unlock_result') {
                                addLog('🔓 已解锁，恢复自动跟随');
                                document.getElementById('lockBtn').textContent = '🔒 锁定';
                                document.getElementById('lockBtn').className = '';
                            } else if (data.type === 'error') {
                                addLog('错误: ' + data.message, true);
                            }
                        } catch (e) {
                            console.error("JSON parse error:", e);
                        }
                    }
                };

                ws.onclose = () => {
                    status.textContent = '未连接 (点击重连)';
                    status.className = 'status disconnected';
                    status.onclick = toggleConnection;
                    addLog('已断开');
                    if (windowRefreshTimer) {
                        clearInterval(windowRefreshTimer);
                        windowRefreshTimer = null;
                    }
                };

                ws.onerror = (e) => {
                    addLog('WebSocket错误. 请检查服务是否开启.', true);
                };

            } catch (err) {
                addLog('创建连接失败: ' + err, true);
            }
        }

        // The original updateFps function is now integrated into ws.onmessage,
        // but keeping it here for other potential uses or if the user wants to re-enable it separately.


        // ==================== Window Selection Logic ====================

        // Update close button text based on current window
        function updateCloseButton() {
            const closeBtn = document.getElementById('closeBtn');
            const select = document.getElementById('windowSelect');
            const currentWindow = document.getElementById('currentWindow').textContent;

        /**
         * Send interaction to server via WebSocket (preferred) or HTTP fallback.
         * @param {string} action - Action type
         * @param {number} x - X coordinate (for click/scroll actions)
         * @param {number} y - Y coordinate (for click/scroll actions)
         * @param {string} text - Text content (for 'type' action)
         * @param {string} key - Key name (for 'key' or 'hotkey' actions)
         */
        async function sendInteraction(action, x = 0, y = 0, text = '', key = '') {
            const payload = { action, x, y };
            if (text) payload.text = text;
            if (key) payload.key = key;

            // Prefer WebSocket for lower latency
            if (ws && ws.readyState === WebSocket.OPEN) {
                try {
                    ws.send(JSON.stringify(payload));
                    // Log success for debugging
                    if (action === 'type') {
                        console.log(`[WS] Typed: "${text}"`);
                    } else if (action === 'key') {
                        console.log(`[WS] Key: ${key}`);
                    }
                    return { status: 'sent_via_ws' };
                } catch (e) {
                    console.warn('[WS] Send failed, falling back to HTTP:', e);
                }
            }

            // Fallback to HTTP
            try {
                const res = await fetch(`${API}/interact`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                return data;
            } catch (e) {
                addLog(`交互失败: ${e}`, true);
                console.error('[sendInteraction] Error:', e);
                return { status: 'error', message: e.toString() };
            }
        }

        // ==================== Touch Gesture - Enhanced with Drag ====================

        let touchStartY = 0;

        const LONG_PRESS_MS = 600;

        let lastTapTime = 0;

        let lastTapY = 0;

        // Pinch zoom
        let initialPinchDistance = 0;
        let isPinching = false;
        let lastZoomTime = 0;

        function getPinchDistance(touches) {
            return Math.hypot(
                touches[0].clientX - touches[1].clientX,
                touches[0].clientY - touches[1].clientY
            );
        }

        async function sendZoom(zoomIn) { /* ... existing zoom logic ... */

        // Transform screen coords to server window coords
        function getWindowCoords(clientX, clientY) {
            const rect = screen.getBoundingClientRect();
            // Canvas uses .width/.height for buffer size (set to match server resolution)
            // serverWindowWidth/Height are sent by server and updated with each frame
            const sourceW = serverWindowWidth || screen.width || rect.width;
            const sourceH = serverWindowHeight || screen.height || rect.height;
            const scaleX = sourceW / rect.width;
            const scaleY = sourceH / rect.height;
            const x = Math.round((clientX - rect.left) * scaleX);
            const y = Math.round((clientY - rect.top) * scaleY);
            return { x, y };
        }

        screen.addEventListener('touchstart', (e) => {
            if (e.target !== screen) return;
            e.preventDefault();

            if (e.touches.length === 2) {
                isPinching = true;
                initialPinchDistance = getPinchDistance(e.touches);
                addLog('✋ 双指缩放');
                return;
            }

            isPinching = false;
            isScrolling = false;
            isDragging = false;

            touchStartY = e.touches[0].clientY;
            touchStartX = e.touches[0].clientX;
            touchStartTime = Date.now();

            // Start Long Press Timer for Drag Mode
            dragTimer = setTimeout(async () => {
                isDragging = true;
                if (navigator.vibrate) navigator.vibrate([30, 50, 30]); // Distinct vibration
                addLog('🖱️ 进入拖拽模式 (松开结束)');

                // Send Mouse Down via WebSocket
                const coords = getWindowCoords(touchStartX, touchStartY);
                await sendInteraction('mousedown', coords.x, coords.y);

            }, LONG_PRESS_MS);

        }, { passive: false });

        screen.addEventListener('touchmove', async (e) => {
            e.preventDefault();

            if (isPinching && e.touches.length === 2) {
                // ... Pinch Logic (simplified for brevity, assume similar to before) ...
                const currentDistance = getPinchDistance(e.touches);
                if (Math.abs(currentDistance - initialPinchDistance) > 50) {
                    const now = Date.now();
                    if (now - lastZoomTime > 300) {
                        sendZoom(currentDistance > initialPinchDistance);
                        lastZoomTime = now;
                        initialPinchDistance = currentDistance;
                    }
                }
                return;
            }

            if (e.touches.length === 1) {
                const currentY = e.touches[0].clientY;
                const currentX = e.touches[0].clientX;
                const deltaY = currentY - touchStartY;
                const deltaX = currentX - touchStartX;

                // Check movement to cancel Long Press (if moved too much before timer fires)

        // Helper: Scroll at specific screen position (for touch accuracy)
        async function sendScrollAtPosition(amount, screenX, screenY) {
            const rect = screen.getBoundingClientRect();
            // Canvas uses .width/.height for buffer size
            const sourceW = serverWindowWidth || screen.width || rect.width;
            const sourceH = serverWindowHeight || screen.height || rect.height;
            const scaleX = sourceW / rect.width;
            const scaleY = sourceH / rect.height;

            const x = Math.round((screenX - rect.left) * scaleX);
            const y = Math.round((screenY - rect.top) * scaleY);

            // Use WebSocket for lower latency
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ action: 'scroll', x: Math.max(0, x), y: Math.max(0, y), text: String(amount) }));
            } else {
                try {
                    await fetch(`${API}/interact`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ action: 'scroll', x: Math.max(0, x), y: Math.max(0, y), text: String(amount) })
                    });
                } catch (e) {
                    // console.log('Scroll error', e);
                }
            }
        }

        let pendingScrollX = 0;
        let pendingScrollY = 0;

                sendScrollAtPosition(pendingScrollAmount, pendingScrollX, pendingScrollY);
                pendingScrollAmount = 0;
            }
        }, 50);

            pendingScrollX = screenX;

            // 选中分类的中心角度（匹配createPieSectors的计算方式）

                    if (activeCategory >= 0 && outerConfig) {
                        let bestDiff = 999;
                        let bestIdx = -1;

                        pieAvailable.forEach((item, index) => {
                            const targetAngle = outerConfig.startAngle + (index * outerConfig.stepAngle);
                            let t = targetAngle % 360;
                            if (t < 0) t += 360;

                            let diff = Math.abs(c - t);
                            if (diff > 180) diff = 360 - diff;

                            // Sticky bias
                            if (index === activeSectorIndex) {
                                diff *= 0.4;
                            }

                            if (diff < bestDiff) {
                                bestDiff = diff;
                                bestIdx = index;
                            }
                        });

                        if (bestDiff < 60) {
                            activeSectorIndex = bestIdx;
                        } else {
                            activeSectorIndex = -1;
                        }
                        updateOuterHighlight(activeSectorIndex);
                    }
                }
            }
        };

        const handleFloatEnd = (e) => {
            window.removeEventListener('touchmove', handleFloatMove);
            window.removeEventListener('touchend', handleFloatEnd);

            if (floatDragTimer) {
                clearTimeout(floatDragTimer);
                floatDragTimer = null;
            }

            if (floatTrigger) floatTrigger.style.opacity = '0.4';

            if (isDraggingFloat) {
                const rect = floatTrigger.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2;
                const screenW = window.innerWidth;

                floatTrigger.style.transition = 'all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275)';

                if (centerX < screenW / 2) {
                    floatTrigger.style.left = '0px';
                    floatTrigger.style.right = 'auto';
                    dockSide = 'left';
                } else {
                    floatTrigger.style.left = 'auto';
                    floatTrigger.style.right = '0px';
                    dockSide = 'right';
                }

                pieConfig = createPieSectors();
                addLog(`吸附: ${dockSide === 'left' ? '左侧' : '右侧'}`);
                isDraggingFloat = false;
                return;
            }

            if (pieActive) {
                if (activeSectorIndex !== -1) {
                    const item = pieAvailable[activeSectorIndex];
                    if (navigator.vibrate) navigator.vibrate(40);

                    if (item.action === 'mod') {
                        toggleModifier(item.value); // Use existing toggle logic
                    } else if (item.action === 'key') {
                        sendKey(item.value);
                        addLog(`发送: ${item.label}`);
                    } else if (item.action === 'hotkey') {
                        sendCombine(item.value.split('+'));
                    } else if (item.action === 'custom') {
                        item.fn(); // Execute custom function (Clipboard)
                    }
                }
                pieActive = false;
                pieMenu.style.display = 'none';
            }
        };

        if (floatTrigger) {
            floatTrigger.addEventListener('touchstart', (e) => {
                const touch = e.touches[0];
                floatStartX = touch.clientX;
                floatStartY = touch.clientY;

                const rect = floatTrigger.getBoundingClientRect();
                floatElStartX = rect.left;
                floatElStartY = rect.top;

                floatTrigger.style.opacity = '1.0';
                floatTrigger.style.transition = 'none';

                isDraggingFloat = false;
                pieActive = false;

                floatDragTimer = setTimeout(() => {
                    isDraggingFloat = true;
                    if (navigator.vibrate) navigator.vibrate(30);
                    addLog('⚪ 移动悬浮球');
                }, 500);

                window.addEventListener('touchmove', handleFloatMove, { passive: false });
                window.addEventListener('touchend', handleFloatEnd, { passive: false });
            });
        }





        document.addEventListener('touchend', (e) => {
            // Handled by handleFloatEnd mostly, but fallback just in case
        });
    </script>

        // ==================== Speech Recognition Integration ====================

        let recognizer = null;
        const voiceBtn = document.getElementById('voiceBtn');

        async function toggleVoice() {
            // 1. 检查并加载模块
            if (typeof SpeechRecognizer === 'undefined') {
                voiceBtn.textContent = '⏳ 加载中...';
                try {
                    await import('/speech/speech-recognizer.js');
                } catch (e) {
                    addLog('❌ 加载语音模块失败', true);
                    voiceBtn.textContent = '🎤 语音';
                    return;
                }
            }

            // 2. 检查浏览器支持
            if (!SpeechRecognizer.isSupported()) {
                addLog('❌ 浏览器不支持语音识别', true);
                voiceBtn.textContent = '🎤 语音';
                return;
            }

            // 3. 初始化识别器
            if (!recognizer) {
                recognizer = new SpeechRecognizer({
                    lang: 'zh-CN',
                    onStart: () => {
                        voiceBtn.style.background = '#e94560';
                        voiceBtn.textContent = '🛑 停止';
                        addLog('🎤 开始语音识别...');
                        if (navigator.vibrate) navigator.vibrate(50);
                    },
                    onEnd: () => {
                        voiceBtn.style.background = '';
                        voiceBtn.textContent = '🎤 语音';
                    },
                    onResult: (text, isFinal) => {
                        if (isFinal && text) {
                            addLog(`🎤 识别: ${text}`);
                            sendInteraction('type', 0, 0, text);
                        }
                    },
                    onError: (err) => {
                        addLog(`❌ 语音错误: ${err}`, true);
                        voiceBtn.style.background = '';
                        voiceBtn.textContent = '🎤 语音';
                    }
                });
            }

            // 4. 切换状态
            if (recognizer.isListening) {
                recognizer.stop();
            } else {
                recognizer.start();
            }
        }

        // --- RESTORED ROBUST MOBILE LOGIC ---

        // Mobile Keyboard Logic
        // Triggered by clicking "Ghost Shell" title

        let isComposing = false;
        const mobileInput = document.getElementById('mobileKeyboardInput');

        if (mobileInput) {
            mobileInput.addEventListener('compositionstart', () => {
                isComposing = true;
                addLog('📝 正在输入...');
            });

            mobileInput.addEventListener('compositionend', (e) => {
                isComposing = false;
                // Defer checking value to ensure standard 'input' event passes or value updates
                setTimeout(() => {
                    handleMobileInput(e.data || mobileInput.value);
                }, 50);
            });

            // Standard input (for non-IME or when composition is done but input fires separately)
            mobileInput.addEventListener('input', (e) => {
                if (isComposing) return;

                // If it's a simple character or paste that didn't trigger composition
                setTimeout(() => {
                    handleMobileInput(mobileInput.value);
                }, 10);
            });

            // Shared handler to deduplicate and send
            function handleMobileInput(text) {
                if (!text) return;

                // Sanitize: Remove zero-width chars, control chars, and known "garbage"
                let cleanText = text.replace(/[\u0000-\u0008\u000B-\u001F\u007F-\u009F\u200b\uFEFF\uFFFD]/g, '');

                if (!cleanText) return;

                addLog(`📤 发送: [${cleanText}]`);
                sendInteraction('type', 0, 0, cleanText);
                mobileInput.value = ''; // Always clear after sending
            }

            // Handle specific control keys
            mobileInput.addEventListener('keydown', (e) => {
                if (isComposing) return;

                if (e.key === 'Enter') {
                    sendInteraction('key', 0, 0, '', 'enter');
                    e.preventDefault();
                } else if (e.key === 'Backspace') {
                    sendInteraction('key', 0, 0, '', 'backspace');
                }
            });
        }

        // Global function to hide the mobile input
        function hideMobileInput() {
            if (mobileInput) {
                mobileInput.style.left = '-9999px';
                mobileInput.style.width = '1px';
                mobileInput.style.height = '1px';
                mobileInput.style.pointerEvents = 'none';
                mobileInput.blur();  // Force blur
            }
        }

        // Track if keyboard is intentionally open
        let mobileKeyboardOpen = false;
        let keyboardHideTimer = null;

        function toggleMobileKeyboard() {
            if (mobileInput) {
                // Check visual state to preventing desync (e.g. if blur fired but logic says open)
                const isVisuallyHidden = (mobileInput.style.left === '-9999px');

                // If logically open OR visually open, we close it.
                // UNLESS it's desynced (Logic=True, Visual=Hidden) -> Then we want to OPEN it.
                // So: If Logic=True AND Visual=Visible -> Close.
                // If Logic=False -> Open.
                // If Logic=True but Visual=Hidden -> Open (Fix Desync).

                if (mobileKeyboardOpen && !isVisuallyHidden) {
                    hideMobileInput();
                    // mobileKeyboardOpen = false; // Handled by hideMobileInput now? No, stick to manual to be safe or move it.
                    // Let's keep existing logic but ensure we reset state.
                    mobileKeyboardOpen = false;
                    addLog('⌨️ 键盘已关闭');
                    return;
                }

                // Show and focus the input
                mobileInput.style.position = 'fixed';
                mobileInput.style.left = '0';
                mobileInput.style.top = '50%';
                mobileInput.style.width = '100%';
                mobileInput.style.height = '50px';
                mobileInput.style.opacity = '0.01';
                mobileInput.style.zIndex = '10000';
                mobileInput.style.fontSize = '16px';
                mobileInput.style.pointerEvents = 'auto';
                mobileInput.removeAttribute('readonly');
                mobileInput.focus();
                mobileInput.click();

                mobileKeyboardOpen = true;
                addLog('⌨️ 调起键盘 - 请输入');

                // Clear any existing timer
                if (keyboardHideTimer) clearTimeout(keyboardHideTimer);

                // Auto-hide after 30 seconds
                keyboardHideTimer = setTimeout(() => {
                    if (mobileKeyboardOpen) {
                        hideMobileInput();
                        mobileKeyboardOpen = false;
                    }
                }, 30000);
            } else {
                addLog('❌ 未找到键盘输入框', true);
            }
        }

        // Hide input when it loses focus (keyboard dismissed)
        if (mobileInput) {
            mobileInput.addEventListener('blur', () => {
                setTimeout(() => {
                    hideMobileInput();
                    mobileKeyboardOpen = false;
                }, 100);
            });
        }

        // Detect keyboard dismiss via viewport resize
        // When mobile keyboard appears/disappears, the viewport height changes
        let lastViewportHeight = window.innerHeight;
        window.addEventListener('resize', () => {
            const currentHeight = window.innerHeight;
            // If viewport got LARGER, keyboard was likely dismissed
            if (currentHeight > lastViewportHeight + 50 && mobileKeyboardOpen) {
                console.log('[Keyboard] Detected dismiss via viewport resize');
                hideMobileInput();
                mobileKeyboardOpen = false;
            }
            lastViewportHeight = currentHeight;
        });

        // When user touches the screen canvas, hide keyboard if open
        screen.addEventListener('touchstart', (e) => {
            if (mobileKeyboardOpen && e.target === screen) {
                // User touched the screen, not the input - dismiss keyboard
                hideMobileInput();
                mobileKeyboardOpen = false;
            }
        }, { passive: true, capture: true });

        window.toggleMobileKeyboard = toggleMobileKeyboard;
        window.toggleKeyboard = toggleMobileKeyboard;




        document.addEventListener('DOMContentLoaded', () => {
            const title = document.querySelector('header h1');
            if (title) {
                title.style.cursor = 'pointer';

                // 单击弹出键盘
                title.onclick = toggleMobileKeyboard;

                    addLog('🔄 刷新页面...');
                    location.reload();
                };
            }

            // 自动连接 WebSocket
            setTimeout(() => {
                addLog('🔌 自动连接中...');
                connect();
            }, 500);
        });

    <script>
        // --- Audio Mode & Mic Logic ---
        const audioBtn = document.getElementById('audioBtn');
        const overlay = document.getElementById('audioModeOverlay');
        const micBtn = document.getElementById('micBtn');
        const exitAudioBtn = document.getElementById('exitAudioBtn');

        let audioModeTimer = null;
        let micStream = null;
        let micRecorder = null;
        let micWs = null;

        // Long press logic
        if (audioBtn) {
            audioBtn.addEventListener('touchstart', (e) => {
                audioModeTimer = setTimeout(enterAudioMode, 800);
            });
            audioBtn.addEventListener('touchend', (e) => {
                if (audioModeTimer) clearTimeout(audioModeTimer);
            });
            audioBtn.addEventListener('mousedown', (e) => {
                audioModeTimer = setTimeout(enterAudioMode, 800);
            });
            audioBtn.addEventListener('mouseup', (e) => {
                if (audioModeTimer) clearTimeout(audioModeTimer);
            });
        }

        function enterAudioMode() {
            if (navigator.vibrate) navigator.vibrate(50);
            overlay.style.display = 'flex';

            // Notify server to stop video
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ action: "set_mode", mode: "audio_only" }));
            }

            // Ensure audio playback is on
            if (!audioEnabled) {
                startAudio();
            }
        }

        exitAudioBtn.onclick = () => {
            overlay.style.display = 'none';
            // Notify server to resume video
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ action: "set_mode", mode: "video" }));
            }
        };

        // Mic Logic
        async function startMic() {
            try {
                const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                const port = window.location.port || (window.location.protocol === 'https:' ? '8444' : '8000');
                const micUrl = `${protocol}//${window.location.hostname || '127.0.0.1'}:${port}/stream/mic`;

                micWs = new WebSocket(micUrl);
                micWs.onopen = async () => {
                    micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    const audioContext = new AudioContext(); // Local context for processing
                    const source = audioContext.createMediaStreamSource(micStream);
                    const processor = audioContext.createScriptProcessor(4096, 1, 1);

                    source.connect(processor);
                    processor.connect(audioContext.destination);

                    processor.onaudioprocess = (e) => {
                        if (micWs && micWs.readyState === WebSocket.OPEN) {
                            // Downsample or send raw? Server expects PCM Float32 or Int16
                            // Let's send raw Float32 from browser (simplest) or convert to Int16
                            // Browser audio is Float32 planar.
                            // To save bandwidth, convert to Int16
                            const inputData = e.inputBuffer.getChannelData(0);
                            const pcm16 = new Int16Array(inputData.length);
                            for (let i = 0; i < inputData.length; i++) {
                                let s = Math.max(-1, Math.min(1, inputData[i]));
                                pcm16[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
                            }
                            micWs.send(pcm16.buffer);
                        }
                    };

                    micBtn.style.background = '#e94560';
                };
            } catch (err) {
                addLog('麦克风启动失败: ' + err, true);
            }
        }

        function stopMic() {
            if (micStream) {
                micStream.getTracks().forEach(track => track.stop());
                micStream = null;
            }
            if (micWs) {
                micWs.close();
                micWs = null;
            }
            micBtn.style.background = '#333';
        }

        // Mic Button Events
        micBtn.addEventListener('touchstart', (e) => { e.preventDefault(); startMic(); });
        micBtn.addEventListener('touchend', (e) => { e.preventDefault(); stopMic(); });
        micBtn.addEventListener('mousedown', (e) => { startMic(); });
        micBtn.addEventListener('mouseup', (e) => { stopMic(); });

    </script>
